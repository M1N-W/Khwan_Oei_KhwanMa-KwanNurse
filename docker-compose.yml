services:
  kwannurse-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: kwannurse-bot:latest
    container_name: kwannurse-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "5000"
      DEBUG: "false"
      RUN_SCHEDULER: "true"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
