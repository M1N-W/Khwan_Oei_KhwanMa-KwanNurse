{# Fragment: notification bell badge + tooltip. Replaced in place via HTMX. #}
<a href="{{ url_for('dashboard.home') }}"
   class="relative inline-flex items-center justify-center w-9 h-9 rounded-full hover:bg-gray-100"
   title="ต้องสนใจ: คิวด่วน {{ queue_high }} · แจ้งเตือนวันนี้ {{ alerts_today }}"
   aria-label="การแจ้งเตือน ({{ count }} รายการ)">
    {# Simple bell SVG — ไม่ต้องโหลด icon lib เพิ่ม #}
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"
         class="w-5 h-5 {% if count > 0 %}text-red-500{% else %}text-gray-500{% endif %}">
        <path d="M10 2a6 6 0 00-6 6v3.586l-.707.707A1 1 0 004 14h12a1 1 0 00.707-1.707L16 11.586V8a6 6 0 00-6-6zM10 18a3 3 0 01-3-3h6a3 3 0 01-3 3z"/>
    </svg>
    {% if count > 0 %}
        <span class="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1
                     rounded-full bg-red-600 text-white text-[10px] font-bold
                     flex items-center justify-center
                     {% if count > 0 %}animate-pulse{% endif %}">
            {{ count if count < 100 else '99+' }}
        </span>
    {% endif %}
</a>
