<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>{% block title %}KwanNurse Dashboard{% endblock %}</title>

    {# Tailwind CSS ผ่าน CDN — ไม่ต้อง build step #}
    <script src="https://cdn.tailwindcss.com"></script>

    {# HTMX สำหรับ partial reload ของ queue/alerts โดยไม่ต้องใช้ JS framework #}
    <script src="https://unpkg.com/htmx.org@1.9.10"
            integrity="sha384-D1Kt99CQMDuVetoL1lrYwg5t+9QdHe7NLX/SoJYkXDFfX37iInKRy5xLSi8nO7UC"
            crossorigin="anonymous"></script>

    {# ฟอนต์ไทยที่อ่านง่าย #}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Sarabun', 'Segoe UI', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen">
    {% block body %}{% endblock %}
</body>
</html>
