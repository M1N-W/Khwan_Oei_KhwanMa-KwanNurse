{% extends "base.html" %}

{% block title %}เข้าสู่ระบบ · ขวัญเอ๋ยขวัญมา Dashboard{% endblock %}

{% block body %}
<main class="login-shell">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="login-brand">
            <span class="brand-mark" aria-hidden="true">KM</span>
            <div>
                <h1 id="login-title" class="login-title">ขวัญเอ๋ยขวัญมา Dashboard</h1>
                <p class="login-subtitle">ระบบติดตามผู้ป่วยหลังผ่าตัดกระดูกและข้อ</p>
            </div>
        </div>

        {% if error %}
        <div class="flash flash-error" role="alert">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('dashboard.login') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="field">
                <label for="username">ชื่อผู้ใช้</label>
                <input class="input" type="text" id="username" name="username" required autofocus autocomplete="username">
            </div>

            <div class="field">
                <label for="password">รหัสผ่าน</label>
                <div class="password-input-wrap">
                    <input class="input" type="password" id="password" name="password" required autocomplete="current-password">
                    <button type="button" class="password-toggle" data-password-toggle="password" aria-controls="password" aria-pressed="false">แสดง</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary full-width">เข้าสู่ระบบ</button>
        </form>

        <p class="tiny muted text-center note-margin">
            ใช้สำหรับพยาบาลของแผนกกระดูกและข้อเท่านั้น
        </p>
    </section>
</main>
{% endblock %}
