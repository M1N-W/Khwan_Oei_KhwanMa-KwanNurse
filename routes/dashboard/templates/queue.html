{% extends "_layout.html" %}

{% block title %}คิวปรึกษา · ขวัญเอ๋ยขวัญมา Dashboard{% endblock %}

{% block main %}
<section class="workspace-panel">
    <div class="workspace-header">
        <div>
            <p class="page-kicker">Triage Workspace</p>
            <h1 class="page-title">คิวปรึกษา ({{ queue|length }} คน)</h1>
        </div>
        <button type="button"
                hx-get="{{ url_for('dashboard.queue_partial') }}"
                hx-target="#queue-table"
                hx-swap="innerHTML"
                class="btn btn-soft">
            รีเฟรช
        </button>
    </div>
    <div id="queue-table"
         hx-get="{{ url_for('dashboard.queue_partial') }}"
         hx-trigger="every 15s"
         hx-swap="innerHTML">
        {% include "_queue_table.html" %}
    </div>
</section>
{% endblock %}
