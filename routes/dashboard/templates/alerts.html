{% extends "_layout.html" %}

{% block title %}การแจ้งเตือน · KwanNurse Dashboard{% endblock %}

{% block main %}
<section class="workspace-panel">
    <div class="workspace-header">
        <div>
            <p class="page-kicker">Risk Inbox</p>
            <h1 class="page-title">การแจ้งเตือน ({{ alerts|length }} รายการ)</h1>
        </div>

        <form method="GET" action="{{ url_for('dashboard.alerts_view') }}" class="filter-form">
            <label class="label" for="days">ช่วง</label>
            <select id="days" name="days" aria-label="ช่วงเวลา" class="select">
                {% for d in [1, 3, 7, 14, 30] %}
                    <option value="{{ d }}" {% if filter_days == d %}selected{% endif %}>
                        {{ d }} วัน
                    </option>
                {% endfor %}
            </select>

            <label class="label" for="level">ระดับ</label>
            <select id="level" name="level" aria-label="ระดับความเสี่ยง" class="select">
                <option value="high"   {% if filter_level == 'high' %}selected{% endif %}>สูงเท่านั้น</option>
                <option value="medium" {% if filter_level == 'medium' %}selected{% endif %}>ปานกลาง+สูง</option>
                <option value="low"    {% if filter_level == 'low' %}selected{% endif %}>ทั้งหมด</option>
            </select>
            <button type="submit" class="btn btn-soft">กรอง</button>
        </form>
    </div>

    <div id="alerts-table"
         hx-get="{{ url_for('dashboard.alerts_partial') }}?days={{ filter_days }}&level={{ filter_level }}"
         hx-trigger="every 30s"
         hx-swap="innerHTML">
        {% include "_alerts_table.html" %}
    </div>
</section>
{% endblock %}
